services:
  db:
    image: postgres:16-alpine
    container_name: mentoring_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mentoring}
      POSTGRES_USER: ${POSTGRES_USER:-mentoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mentoring}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mentoring} -d ${POSTGRES_DB:-mentoring}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: mentoring_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
