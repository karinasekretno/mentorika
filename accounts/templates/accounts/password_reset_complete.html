{% extends 'base.html' %}

{% block title %}Пароль изменён — Менторика{% endblock %}

{% block content %}
<section class="section">
  <div class="container" style="max-width: 520px;">
    <div class="plasma-card plasma-card--elevated">
      <h1 class="text-h2" style="margin-bottom: var(--plasma-spacing-4);">Пароль изменён</h1>
      <p class="text-body-m text-secondary" style="margin-bottom: var(--plasma-spacing-6);">
        Новый пароль сохранён. Теперь можно войти в аккаунт.
      </p>
      <div class="cta-form">
        <a href="{% url 'login' %}" class="plasma-btn plasma-btn--primary plasma-btn--l" style="width: 100%;">
          Войти
        </a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
