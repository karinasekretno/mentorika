<div class="chat-shared-panel" data-chat-shared-panel hidden>
  <div class="chat-shared-panel__tabs" role="tablist" aria-label="Тип вложений">

      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      <span>Изображения</span>
    </button>
    <button type="button" class="chat-shared-tab" data-shared-tab="files" role="tab" aria-selected="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>

      <span>Ссылки</span>

  </div>
  <div class="chat-shared-panel__content" data-chat-shared-content>
    <p class="chat-shared-panel__empty" data-chat-shared-empty hidden>Здесь пока ничего нет.</p>
    <div class="chat-shared-panel__groups" data-chat-shared-groups></div>
  </div>
</div>
