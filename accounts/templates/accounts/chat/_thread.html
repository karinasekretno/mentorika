<div class="chat-thread"
     data-chat-thread
     data-messages-url="{% url 'chat_messages_api' conversation.pk %}"
     data-last-message-id="{{ last_message_id }}"
     data-user-id="{{ user.id }}"
     {% if session_rating_enabled %}data-rating-url-template="{% url 'booking_rate' 999999999 %}"{% endif %}>
  <div class="chat-thread__messages" data-chat-messages>
    {% for msg in chat_messages %}
    {% include 'accounts/chat/_message.html' with msg=msg conversation=conversation %}
    {% empty %}
    <p class="chat-thread__empty" data-chat-empty>Сообщений пока нет.</p>
    {% endfor %}
  </div>

  <div class="chat-context-menu" data-chat-context-menu hidden>
    <button type="button" class="chat-context-menu__item" data-chat-action="reply">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a4 4 0 0 1 4 4v7"/></svg>
      <span>Ответить</span>
    </button>
    <button type="button" class="chat-context-menu__item chat-context-menu__item--danger" data-chat-action="delete" hidden>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
      <span>Удалить</span>
    </button>
  </div>

  <div class="chat-modal" data-chat-delete-modal hidden>
    <div class="chat-modal__backdrop" data-chat-modal-close></div>
    <div class="chat-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="chat-delete-title">
      <h3 class="chat-modal__title" id="chat-delete-title">Удалить сообщение</h3>
      <p class="chat-modal__text">Вы действительно хотите удалить сообщение?</p>
      <div class="chat-modal__actions">
        <button type="button" class="chat-modal__btn" data-chat-modal-close>Отмена</button>
        <button type="button" class="chat-modal__btn chat-modal__btn--danger" data-chat-delete-confirm>Удалить</button>
      </div>
    </div>
  </div>

  <p class="chat-composer__error" data-chat-error hidden></p>

  <div class="chat-composer__reply" data-chat-reply-preview hidden>
    <div class="chat-composer__reply-body">
      <span class="chat-composer__reply-label" data-chat-reply-label></span>
      <span class="chat-composer__reply-text" data-chat-reply-text></span>
    </div>
    <button type="button" class="chat-composer__reply-cancel" data-chat-reply-cancel aria-label="Отменить ответ">×</button>
  </div>

  <div class="chat-composer__preview-list" data-chat-preview-list hidden></div>

  <div class="chat-emoji-picker" data-chat-emoji-picker hidden>
    <div class="chat-emoji-picker__grid" data-chat-emoji-grid></div>
  </div>

  <form class="chat-composer" data-chat-form novalidate>
    {% csrf_token %}
    <button type="button" class="chat-composer__attach" data-chat-attach aria-label="Прикрепить файл">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <button type="button" class="chat-composer__emoji" data-chat-emoji-toggle aria-label="Смайлики" aria-expanded="false">
      <span class="chat-composer__emoji-icon" aria-hidden="true">😊</span>
    </button>
    <input type="file" class="chat-composer__file-input" data-chat-file hidden multiple
           accept=".pdf,.doc,.docx,.txt,.rtf,.png,.jpg,.jpeg,.gif,.webp,.zip,.rar,.7z,.xls,.xlsx,.ppt,.pptx,.csv">
    {{ form.text }}
    <button type="submit" class="plasma-btn plasma-btn--primary plasma-btn--s chat-composer__send" data-chat-send>Отправить</button>
  </form>
</div>
