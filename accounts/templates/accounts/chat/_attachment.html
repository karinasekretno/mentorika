{% if attachment.is_image %}
<a href="{% url 'chat_attachment_download' conversation.pk attachment.pk %}" class="chat-message__attachment-image" target="_blank" rel="noopener">
  <img src="{% url 'chat_attachment_download' conversation.pk attachment.pk %}" alt="{{ attachment.name }}">
</a>
{% else %}
<a href="{% url 'chat_attachment_download' conversation.pk attachment.pk %}" class="chat-message__attachment-file" target="_blank" rel="noopener">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M12 18v-6M9 15l3 3 3-3"/></svg>
  <span>{{ attachment.name }}</span>
</a>
{% endif %}
